# Overnight-run topology (PROJECT_BRIEF §7).
#
#   docker compose run --rm dryrun     # A6 acceptance: dry-run in-container
#   docker compose run --rm lab        # live overnight loop (post-Gate H)
#
# The lab container sits on an INTERNAL-ONLY network; its sole egress path
# is the tinyproxy sidecar, which forwards only to the two VERIFIED LLM
# API domains. R2: only data/train_val (+ the two committed audit JSONs)
# exists inside the container — data/all and data/raw hold holdout-period
# bars and are blotted out by an empty read-only mount.
#
# R6: this file wires NO credentials. Injecting LLM API keys is a HUMAN
# launch-time action at Gate H, e.g.:
#   docker compose run --rm -e ANTHROPIC_API_KEY -e OPENAI_API_KEY lab
# with the values exported only in the human's shell.

services:
  proxy:
    build: docker/proxy
    networks: [internal, egress]
    restart: unless-stopped

  lab:
    build: .
    depends_on: [proxy]
    networks: [internal]
    environment:
      HTTP_PROXY: http://proxy:8888
      HTTPS_PROXY: http://proxy:8888
      NO_PROXY: ""
    volumes:
      # repo read-write EXCEPT the frozen zone and the data (R1/R2/§7)
      - .:/workspace
      - ./engine:/workspace/engine:ro
      - ./docker/empty:/workspace/data:ro
      - ./data/train_val:/workspace/data/train_val:ro
      - ./data/universe.json:/workspace/data/universe.json:ro
      - ./data/download_report.json:/workspace/data/download_report.json:ro
    working_dir: /workspace
    mem_limit: 4g
    cpus: 2
    # Launcher finalize: the loop makes no run-end commit (its logger
    # cannot capture its own last act); the launcher commits the toolcall
    # log + final STATE.md after the orchestrator exits, unlogged by
    # construction. Pathspec-limited so pre-staged files never ride along
    # (R5); a finalize failure exits 70 instead of masking as the loop
    # status; otherwise the loop's exit status is preserved.
    command: >
      bash -c 'uv run python -m orchestrator.loop --mode live
      --run-id ${RUN_ID:-overnight}; status=$$?;
      git add runs/ STATE.md || exit 70;
      if ! git diff --cached --quiet -- runs/ STATE.md; then
      git commit -m "run ${RUN_ID:-overnight}: toolcall log finalized"
      -- runs/ STATE.md || exit 70; fi;
      exit $$status'

  # A6 acceptance service: no credentials, same mounts and network posture.
  # Clones the repo inside the container so its per-stage commits never
  # touch the real audit spine.
  dryrun:
    build: .
    depends_on: [proxy]
    networks: [internal]
    environment:
      HTTP_PROXY: http://proxy:8888
      HTTPS_PROXY: http://proxy:8888
      NO_PROXY: ""
    volumes:
      - .:/workspace
      - ./engine:/workspace/engine:ro
      - ./docker/empty:/workspace/data:ro
      - ./data/train_val:/workspace/data/train_val:ro
      - ./data/universe.json:/workspace/data/universe.json:ro
      - ./data/download_report.json:/workspace/data/download_report.json:ro
    working_dir: /workspace
    mem_limit: 4g
    cpus: 2
    command: bash scripts/container_dryrun.sh

networks:
  internal:
    internal: true
  egress:
